<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Forgot Password - Drayth Online</title>
  <style>
    body {
      margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      font-family:Arial,sans-serif; color:#fff;
      background: radial-gradient(circle at top, #1b1038 0%, #090b14 45%, #05070d 100%);
    }
    .card {
      width: 390px; padding: 28px; border-radius: 20px;
      background: rgba(17,20,31,0.94); border: 1px solid rgba(137,86,255,0.28);
    }
    h1 { text-align:center; }
    input {
      width:100%; padding:14px 16px; border-radius:12px; border:1px solid #2d3142;
      background:#171b28; color:#fff; outline:none; font-size:15px; margin-top:10px;
    }
    button {
      width:100%; margin-top:16px; padding:13px 14px; border:none; border-radius:12px;
      cursor:pointer; font-weight:700; font-size:15px; color:white;
      background: linear-gradient(135deg, #6d28d9, #8b5cf6);
    }
    #status { margin-top:16px; min-height:22px; text-align:center; font-size:14px; color:#d2d6e7; }
    a { display:block; margin-top:12px; text-align:center; color:#bba6ff; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Forgot Password</h1>
    <input id="email" type="email" placeholder="Enter your email" />
    <button onclick="sendReset()">Send reset link</button>
    <div id="status"></div>
    <a href="login.html">Back to login</a>
  </div>

  <script>
    const API = "https://drayth-server.onrender.com";

    function sendReset() {
      const email = document.getElementById("email").value.trim();

      fetch(API + "/forgot-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      })
      .then(r => r.text())
      .then(msg => {
        document.getElementById("status").innerText = msg;
      })
      .catch(() => {
        document.getElementById("status").innerText = "Could not send reset email.";
      });
    }
  </script>
</body>
</html>
