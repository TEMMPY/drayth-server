<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>My Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #181a20;
      color: white;
      margin: 0;
      padding: 20px;
    }

    .box {
      max-width: 700px;
      margin: auto;
      background: #242833;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    h1, h2 {
      text-align: center;
    }

    .player-card {
      background: #2f3545;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      background: #2f3545;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #444;
    }

    th {
      background: #3c4458;
    }

    tr:hover {
      background: #3a4050;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>My Game</h1>

    <div class="player-card">
      <h2>Your Character</h2>
      <p id="playerInfo">Loading...</p>
    </div>

    <h2>Leaderboard</h2>
    <table>
      <thead>
        <tr>
          <th>Rank</th>
          <th>Username</th>
          <th>Level</th>
          <th>XP</th>
          <th>Gold</th>
        </tr>
      </thead>
      <tbody id="leaderboardBody">
        <tr>
          <td colspan="5">Loading leaderboard...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    fetch("/me")
      .then(res => res.json())
      .then(user => {
        document.getElementById("playerInfo").textContent =
          `Username: ${user.username} | Level: ${user.level} | XP: ${user.xp} | Gold: ${user.gold}`;
      })
      .catch(() => {
        document.getElementById("playerInfo").textContent = "You are not logged in.";
      });

    fetch("/leaderboard")
      .then(res => res.json())
      .then(users => {
        const body = document.getElementById("leaderboardBody");
        body.innerHTML = "";

        if (!users.length) {
          body.innerHTML = `<tr><td colspan="5">No players found</td></tr>`;
          return;
        }

        users.forEach((user, index) => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${index + 1}</td>
            <td>${user.username}</td>
            <td>${user.level}</td>
            <td>${user.xp}</td>
            <td>${user.gold}</td>
          `;
          body.appendChild(row);
        });
      })
      .catch(() => {
        document.getElementById("leaderboardBody").innerHTML =
          `<tr><td colspan="5">Failed to load leaderboard</td></tr>`;
      });
  </script>
</body>
</html>
