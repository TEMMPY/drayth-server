<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Drayth Online - Login</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at top, #1b1038 0%, #090b14 45%, #05070d 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 30%, rgba(122, 58, 255, 0.18), transparent 28%),
        radial-gradient(circle at 80% 70%, rgba(88, 0, 255, 0.14), transparent 24%);
    }

    .login-card {
      width: 380px;
      padding: 28px;
      border-radius: 20px;
      background: rgba(17, 20, 31, 0.94);
      border: 1px solid rgba(137, 86, 255, 0.28);
      box-shadow: 0 0 40px rgba(0,0,0,0.45);
      position: relative;
      z-index: 2;
    }

    .title {
      text-align: center;
      font-size: 40px;
      font-weight: 800;
      margin: 0 0 6px;
      color: #ffffff;
    }

    .subtitle {
      text-align: center;
      color: #b5b8c8;
      margin: 0 0 24px;
      font-size: 14px;
    }

    .label {
      display: block;
      margin: 12px 0 6px;
      color: #c9ccda;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #2d3142;
      background: #171b28;
      color: #fff;
      outline: none;
      font-size: 15px;
    }

    input:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.18);
    }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 18px;
    }

    button {
      flex: 1;
      padding: 13px 14px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 15px;
      color: white;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .btn-register {
      background: linear-gradient(135deg, #6d28d9, #8b5cf6);
    }

    .btn-login {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
    }

    #status {
      margin-top: 16px;
      min-height: 22px;
      text-align: center;
      font-size: 14px;
      color: #d2d6e7;
    }

    .footer-note {
      margin-top: 18px;
      text-align: center;
      font-size: 12px;
      color: #8b91a9;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="login-card">
    <h1 class="title">Drayth Online</h1>
    <p class="subtitle">Enter the world</p>

    <label class="label">USERNAME</label>
    <input id="user" placeholder="Enter username" />

    <label class="label">PASSWORD</label>
    <input id="pass" type="password" placeholder="Enter password" />

    <div class="btn-row">
      <button class="btn-register" onclick="register()">Register</button>
      <button class="btn-login" onclick="login()">Login</button>
    </div>

    <div id="status"></div>
    <div class="footer-note">Live at draythonline.com</div>
  </div>

  <script>
    const API = "https://drayth-server.onrender.com";

    function setStatus(text) {
      document.getElementById("status").innerText = text;
    }

    function register() {
      const username = document.getElementById("user").value.trim();
      const password = document.getElementById("pass").value.trim();

      if (!username || !password) {
        setStatus("Enter a username and password.");
        return;
      }

      fetch(API + "/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      })
      .then(r => r.text())
      .then(msg => setStatus(msg))
      .catch(() => setStatus("Register failed."));
    }

    function login() {
      const username = document.getElementById("user").value.trim();
      const password = document.getElementById("pass").value.trim();

      if (!username || !password) {
        setStatus("Enter a username and password.");
        return;
      }

      fetch(API + "/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          localStorage.setItem("user", username);
          window.location = "index.html";
        } else {
          setStatus("Login failed.");
        }
      })
      .catch(() => setStatus("Login failed."));
    }
  </script>
</body>
</html>
